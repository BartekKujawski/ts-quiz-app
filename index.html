<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/styles/styles.css">
    <title>Interactive Quiz</title>

    <script type="module" src="./dist/ts/main.js" defer></script>
</head>

<body>
    <main>
        <section class="quiz-container">
            <h1 class="quiz-title">Quiz App - Guess the result in the console (JS Edition)</h1>
            <hr>
            <h2 class="question-text">Question</h2>
            <ul class="options-list">
                <li class="option"><button class="option-btn" data-option="0">Option 1</button></li>
                <li class="option"><button class="option-btn" data-option="1">Option 2</button></li>
                <li class="option"><button class="option-btn" data-option="2">Option 3</button></li>
                <li class="option"><button class="option-btn" data-option="3">Option 4</button></li>
            </ul>
            <progress class="quiz-progress" value="1" min="1" max="10"></progress>
            <button class="next-question-btn">Next</button>
            <div class="question-counter"><span class="current-question">1</span> of <span
                    class="max-questions">10</span> questions</div>
        </section>

        <div class="dialog-opened-bg"></div>
        <dialog class="dialog-modal">
            <h3 class="dialog-title">End of Quiz!</h3>
            <p class="final-score">Final score: <span class="final-score-num">6</span></p>
            <button class="restart-btn">Play again!</button>
        </dialog>
    </main>
</body>

</html>
