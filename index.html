<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz</title>
</head>

<body>
    <main>
        <section class="quiz-container">
            <h1 class="quiz-title">Quiz App - Guess the result in the console (JS Edition)</h1>
            <h2 class="question-text">Question</h2>
            <ul class="options-list">
                <li class="option"><button class="option btn">Option 1</button></li>
                <li class="option"><button class="option btn">Option 2</button></li>
                <li class="option"><button class="option btn">Option 3</button></li>
                <li class="option"><button class="option btn">Option 4</button></li>
            </ul>
            <progress class="quiz-progress" value="1" min="1" max="10"></progress>
            <button class="next-question">Next</button>
        </section>

        <dialog class="dialog-modal">
            <h3 class="dialog-title">End of Quiz!</h3>
            <p class="final-score">6</p>
            <button class="restart-btn">Play again!</button>
        </dialog>
    </main>
</body>

</html>
